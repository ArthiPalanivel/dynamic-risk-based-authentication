<!DOCTYPE html>
<html>

<head>

<title>Verify OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* CYBER FRAME */

.frame{
    width:420px;
    padding:50px;
    border:2px solid #00eaff;
    position:relative;
    box-shadow:0 0 35px #00eaff;
    text-align:center;
}

/* Corner design */

.frame:before{
    content:"";
    position:absolute;
    top:-2px;
    left:-2px;
    width:60px;
    height:60px;
    border-top:2px solid #00eaff;
    border-left:2px solid #00eaff;
}

.frame:after{
    content:"";
    position:absolute;
    bottom:-2px;
    right:-2px;
    width:60px;
    height:60px;
    border-bottom:2px solid #00eaff;
    border-right:2px solid #00eaff;
}

/* Title */

h2{
    color:#00eaff;
    margin-bottom:25px;
}

/* Input */

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    margin-bottom:20px;
    border-radius:5px;
    background:#eee;
    text-align:center;
    font-size:16px;
}

/* Button */

button{
    padding:10px 25px;
    border:1px solid #00eaff;
    background:transparent;
    color:#00eaff;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

button:hover{
    background:#00eaff;
    color:black;
}

.subtitle{
    font-size:14px;
    margin-bottom:20px;
    color:#ccc;
}

</style>

</head>

<body>

<div class="frame">

<h2>OTP Verification</h2>

<p class="subtitle">
Enter the 6-digit code sent to your email
</p>

<form method="POST">

<input type="text" name="otp" placeholder="Enter 6-digit OTP" required>

<button type="submit">Verify</button>

</form>

</div>

</body>
</html>
