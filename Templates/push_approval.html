<!DOCTYPE html>
<html>

<head>

<title>Push Notification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Cyber Frame */

.frame{
    width:420px;
    padding:50px;
    border:2px solid #00eaff;
    position:relative;
    box-shadow:0 0 40px #00eaff;
    text-align:center;
}

/* Futuristic corners */

.frame:before{
    content:"";
    position:absolute;
    top:-2px;
    left:-2px;
    width:60px;
    height:60px;
    border-top:2px solid #00eaff;
    border-left:2px solid #00eaff;
}

.frame:after{
    content:"";
    position:absolute;
    bottom:-2px;
    right:-2px;
    width:60px;
    height:60px;
    border-bottom:2px solid #00eaff;
    border-right:2px solid #00eaff;
}

/* Title */

h2{
    color:#00eaff;
    margin-bottom:10px;
}

/* Subtitle */

p{
    color:#ccc;
    margin-bottom:30px;
}

/* Buttons */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:12px 30px;
    border:1px solid #00eaff;
    background:transparent;
    color:#00eaff;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

/* Approve hover */

button[value="approve"]:hover{
    background:#00eaff;
    color:black;
}

/* Deny button */

button[value="deny"]{
    border-color:#ff4d4d;
    color:#ff4d4d;
}

button[value="deny"]:hover{
    background:#ff4d4d;
    color:black;
}

</style>

</head>

<body>

<div class="frame">

<h2>Push Notification Sent</h2>

<p>Please approve the login request.</p>

<form method="POST">

<div class="buttons">

<button type="submit" name="decision" value="approve">
Approve
</button>

<button type="submit" name="decision" value="deny">
Deny
</button>

</div>

</form>

</div>

</body>

</html>
