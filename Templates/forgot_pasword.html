<!DOCTYPE html>
<html>

<head>

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CYBER FRAME */

.frame{
width:520px;
padding:50px;
border:2px solid #00eaff;
box-shadow:0 0 40px #00eaff;
position:relative;
}

.frame:before{
content:"";
position:absolute;
top:-2px;
left:-2px;
width:70px;
height:70px;
border-top:2px solid #00eaff;
border-left:2px solid #00eaff;
}

.frame:after{
content:"";
position:absolute;
bottom:-2px;
right:-2px;
width:70px;
height:70px;
border-bottom:2px solid #00eaff;
border-right:2px solid #00eaff;
}

h2{
text-align:center;
color:#00eaff;
}

p{
text-align:center;
font-size:14px;
margin-bottom:20px;
}

/* INPUT */

.input-box{
width:100%;
margin-top:10px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
outline:none;
background:#eee;
border-radius:4px;
box-sizing:border-box;
}

/* BUTTON */

button{
margin-top:20px;
padding:12px;
width:100%;
border:1px solid #00eaff;
background:transparent;
color:#00eaff;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00eaff;
color:black;
}

</style>

</head>

<body>

<div class="frame">

<h2>Forgot Password</h2>

<p>Enter your registered email to receive OTP</p>

<form method="POST">

<div class="input-box">
<input type="email" name="email" placeholder="Enter Email" required>
</div>

<button type="submit">
Send OTP
</button>

</form>

</div>

</body>
</html>
