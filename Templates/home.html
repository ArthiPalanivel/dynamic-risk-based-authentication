<!DOCTYPE html>
<html>
<head>

<title>Quantum Authentication</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    font-size:40px;
    color:#38bdf8;
}

p{
    color:#cbd5f5;
    margin-bottom:40px;
}

.btn{
    padding:15px 35px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.register{
    background:#2563eb;
    color:white;
}

.login{
    background:#06b6d4;
    color:white;
}

.btn:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1> Welcome !!! </h1>

<a href="{{ url_for('auth.register') }}">
<button class="btn register">Register</button>
</a>

<a href="{{ url_for('auth.login') }}">
<button class="btn login">Login</button>
</a>

</div>

</body>
</html>
