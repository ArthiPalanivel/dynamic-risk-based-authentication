<!DOCTYPE html>
<html>

<head>

<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CYBER FRAME */

.frame{
width:520px;
padding:50px;
border:2px solid #00eaff;
box-shadow:0 0 40px #00eaff;
position:relative;
}

.frame:before{
content:"";
position:absolute;
top:-2px;
left:-2px;
width:70px;
height:70px;
border-top:2px solid #00eaff;
border-left:2px solid #00eaff;
}

.frame:after{
content:"";
position:absolute;
bottom:-2px;
right:-2px;
width:70px;
height:70px;
border-bottom:2px solid #00eaff;
border-right:2px solid #00eaff;
}

h2{
text-align:center;
color:#00eaff;
margin-bottom:20px;
}

/* INPUT BOX */

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
padding-right:45px;
border:none;
outline:none;
background:#eee;
border-radius:4px;
box-sizing:border-box;
}

/* Eye icon */

.toggle{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
color:#00eaff;
}

/* Button */

button{
margin-top:10px;
padding:12px;
width:100%;
border:1px solid #00eaff;
background:transparent;
color:#00eaff;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00eaff;
color:black;
}

</style>

</head>

<body>

<div class="frame">

<h2>Reset Password</h2>

<form method="POST">

<div class="input-box">
<input type="password" name="password1" id="password1" placeholder="New Password" required>
<span class="toggle" onclick="togglePassword('password1', this)">👁</span>
</div>

<div class="input-box">
<input type="password" name="password2" id="password2" placeholder="Confirm Password" required>
<span class="toggle" onclick="togglePassword('password2', this)">👁</span>
</div>

<button type="submit">
Update Password
</button>

</form>

</div>

<script>

function togglePassword(id, icon){

const field = document.getElementById(id);

if(field.type === "password"){
field.type="text";
icon.textContent="🙈";
}else{
field.type="password";
icon.textContent="👁";
}

}

</script>

</body>
</html>
