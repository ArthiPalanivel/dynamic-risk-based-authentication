<!DOCTYPE html>
<html>

<head>

<title>Face Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */

.card{
    background:#020617;
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:420px;
    box-shadow:0 0 35px rgba(56,189,248,0.25);
}

h2{
    color:#38bdf8;
}

.subtitle{
    color:#cbd5f5;
}

.warning{
    color:#ef4444;
    margin-top:5px;
}

/* SCANNER */

.scanner{
    position:relative;
    width:300px;
    height:300px;
    margin:30px auto;
    border-radius:50%;
    border:3px solid #38bdf8;
    overflow:hidden;
    box-shadow:0 0 25px rgba(56,189,248,0.4);
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Scan Line */

.scan-line{
    position:absolute;
    width:100%;
    height:4px;
    background:#38bdf8;
    animation:scan 2s infinite;
}

@keyframes scan{
    0%{top:0}
    100%{top:100%}
}

/* Progress */

.progress{
    height:6px;
    background:#1e293b;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#38bdf8;
    animation:loading 3s infinite;
}

@keyframes loading{
    0%{width:0%}
    50%{width:70%}
    100%{width:100%}
}

/* Button */

button{
    margin-top:25px;
    padding:12px 30px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="card">

<h2>Face Verification</h2>

<p class="subtitle">Look at the camera for identity verification</p>

<p class="warning">⚠ You have 3 attempts remaining</p>

<div class="scanner">

<video id="video" autoplay></video>

<div class="scan-line"></div>

</div>

<button onclick="capture()">Capture & Verify</button>

<div class="progress">
<div class="progress-bar"></div>
</div>

<form id="faceForm" method="POST">
<input type="hidden" name="face_embedding" id="face_embedding">
</form>

<canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

</div>

<script>

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
    video.srcObject = stream;
})
.catch(err=>{
    alert("Camera access denied!");
});

function capture(){

    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");

    context.drawImage(video,0,0,320,240);

    const imageData = canvas.toDataURL("image/png");

    document.getElementById("face_embedding").value = imageData;
    document.getElementById("faceForm").submit();

}

</script>

</body>

</html>
